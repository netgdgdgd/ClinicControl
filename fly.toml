app = "cliniccontrol"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG = "False"
  # En producción usar servicios externos:
  # DATABASE_URL=mysql://<user>:<password>@<host>:3306/clinica_db
  # ACTIVEMQ_HOST=<activemq-host>
  # ACTIVEMQ_PORT=61613

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443
