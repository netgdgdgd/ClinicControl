<div class="card h-100">
    <div class="card-header bg-white">
        <strong>Consulta: Cita #{{ sala.cita.id }}</strong>
    </div>
    <div class="card-body overflow-auto" style="height: 400px;">
        {% for mensaje in mensajes %}
            <div class="d-flex mb-3 {% if mensaje.remitente == request.user %}justify-content-end{% else %}justify-content-start{% endif %}">
                <div class="p-2 rounded {% if mensaje.remitente == request.user %}bg-primary text-white{% else %}bg-light border{% endif %}">
                    {% if mensaje.remitente == request.user %}
                        <strong>Tú:</strong> {{ mensaje.contenido }}
                    {% else %}
                        <strong>{{ mensaje.remitente.username }}:</strong> {{ mensaje.contenido }}
                    {% endif %}
                    <small class="d-block {% if mensaje.remitente == request.user %}text-white-50{% else %}text-muted{% endif %}" style="font-size: 0.7em;">
                        {{ mensaje.fecha_envio|date:"H:i" }}
                    </small>
                </div>
            </div>
        {% endfor %}
    </div>
    <div class="card-footer bg-white">
        <form hx-post="{% url 'chat_enviar_mensaje' sala.id %}" 
            hx-target="#main-chat-container" 
            hx-swap="innerHTML"
            class="input-group">
            {% csrf_token %}
            <input type="text" name="contenido" class="form-control" placeholder="Escribe un mensaje..." required>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    // Conexión WebSocket al broker usando el mismo host del navegador
    var wsHost = window.location.hostname;
    var client = Stomp.client('wss://' + wsHost + ':61614/stomp');

    client.connect('admin', 'admin', function() {
        // Suscribirse al tópico de la sala
        client.subscribe('/topic/chat.{{ sala.id }}', function(message) {
            var data = JSON.parse(message.body);

            // Actualizar la UI sin recargar
            var chatBox = document.querySelector('.card-body');
            chatBox.innerHTML += `
                <div class="d-flex justify-content-start mb-3">
                    <div class="p-2 rounded bg-light border">
                        <strong>${data.remitente}:</strong> ${data.contenido}
                        <small class="d-block text-muted" style="font-size: 0.7em;">${data.fecha}</small>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    });
</script>
