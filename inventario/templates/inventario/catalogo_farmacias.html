{% extends 'base.html' %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-5">
        <div class="col-lg-10 mx-auto">
            <div class="mb-4">
                <h1 class="display-5 mb-2">
                    <i class="fas fa-pills"></i> Catálogo de Medicamentos
                </h1>
                <p class="text-muted">Encuentra los medicamentos disponibles en nuestras farmacias</p>
            </div>

            <div class="card shadow-sm mb-5 border-0">
                <div class="card-body">
                    <form class="d-flex gap-2"
                          hx-get="{% url 'catalogo-farmacias' %}" 
                          hx-target="#resultados-busqueda" 
                          hx-trigger="keyup delay:500ms from:input, submit">
                        
                        <div class="flex-grow-1">
                            {{ form.busqueda }}
                        </div>
                        <button type="submit" class="btn btn-primary" title="Buscar medicamentos">
                            <i class="fas fa-search"></i> Buscar
                        </button>
                        
                        {% if busqueda %}
                            <a href="{% url 'catalogo-farmacias' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Limpiar
                            </a>
                        {% endif %}
                    </form>
                </div>
            </div>

            <div id="resultados-busqueda">
                {% include 'inventario/partials/resultados_catalogo.html' %}
            </div>
            
        </div>
    </div>
</div>

<style>
    .medicamento-card {
        transition: all 0.3s ease;
    }

    .medicamento-card:hover {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        transform: translateY(-2px);
    }

    .medicamento-card .card-title {
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.3;
    }

    #busqueda-medicamentos {
        border-radius: 0.5rem;
    }

    #busqueda-medicamentos:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
</style>
{% endblock %}
