{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Agregar Nuevo Medicamento</h5>
                </div>
                <div class="card-body">
                    <form hx-post="{% url 'medicamento-list' %}" 
                          hx-target="#resultado-inventario"
                          hx-swap="innerHTML">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Nombre del Medicamento</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej: Paracetamol" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="2" placeholder="Ej: Analgésico y antipirético"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Inicial</label>
                                <input type="number" name="stock" class="form-control" value="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" name="precio" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Registrar en Inventario</button>
                    </form>
                    
                    <div id="resultado-inventario" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
