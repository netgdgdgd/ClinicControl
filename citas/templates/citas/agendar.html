{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Agendar Nueva Cita</div>
                <div class="card-body">
                    <form hx-post="{% url 'agendar-cita' %}" 
                          hx-target="#resultado-cita"
                          hx-swap="innerHTML">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" name="fecha_hora" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Motivo de la consulta</label>
                            <textarea name="motivo" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Seleccionar Médico</label>
                            <select name="medico" class="form-select">
                                {% for med in medicos %}
                                    <option value="{{ med.id }}">{{ med.nombres }} {{ med.apellidos }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Confirmar Cita</button>
                    </form>
                    
                    <div id="resultado-cita" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
